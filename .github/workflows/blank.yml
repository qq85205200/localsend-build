name: LocalSend Debian10 arm64 AppImage 编译
on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 启用 ARM64 模拟
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - name: 编译并打包
        uses: addnab/docker-run-action@v3
        with:
          image: debian:10
          options: --platform linux/arm64 -v ${{ github.workspace }}:/build
          run: |
            # 🔥 关键修复1：直接重写完整的 Debian 10 归档源
            cat > /etc/apt/sources.list <<EOF
deb http://archive.debian.org/debian/ buster main contrib non-free
deb-src http://archive.debian.org/debian/ buster main contrib non-free
deb http://archive.debian.org/debian-security/ buster/updates main contrib non-free
deb-src http://archive.debian.org/debian-security/ buster/updates main contrib non-free
EOF

            # 🔥 关键修复2：允许过期的 Release 文件
            apt update --allow-releaseinfo-change -y

            # 先安装基础工具和修复依赖
            apt install -y --fix-missing procps build-essential git curl wget unzip
            apt install -y cmake clang libgtk-3-dev ninja-build libayatana-appindicator3-dev

            # 安装 Flutter
            git clone https://github.com/flutter/flutter.git -b 3.13.9 /flutter
            export PATH=$PATH:/flutter/bin
            flutter config --no-analytics

            # 下载源码
            git clone https://github.com/localsend/localsend /app
            cd /app
            git checkout v1.15.6

            # 编译
            flutter pub get
            flutter build linux --release

            # 打包 AppImage
            wget -O appimagetool https://github.com/AppImage/AppImageKit/releases/download/13/appimagetool-aarch64.AppImage
            chmod +x appimagetool
            cp -r build/linux/arm64/release/bundle/ LocalSend
            ./appimagetool LocalSend
            mv LocalSend-aarch64.AppImage /build/LocalSend-1.15.6-Debian10-arm64.AppImage

      - name: 上传成品
        uses: actions/upload-artifact@v4
        with:
          name: LocalSend-Debian10-arm64
          path: LocalSend-1.15.6-Debian10-arm64.AppImage
